sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.organization=${SONAR_ORG_KEY}
sonar.projectName=fle-pay
sonar.projectVersion=1.0

# Source directories
sonar.sources=.
sonar.exclusions=node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,.next/**,out/**,coverage/**,public/**

# Language
sonar.language=ts

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
